[project]
site_name = "Wiki L"
site_description = "A new project generated from the default template project."
site_author = "LeonSong"
repo_url = "https://github.com/LeonSong-DM"
repo_name = "wiki-leon"

nav = [
    {"Home" = ["index.md"]},

    {"Python" = [
        "python/index.md",

        {"PythonPro" = [
            "python/PythonPro/index.md"
        ]},

        {"DataProcess" = [
           "python/DataProcess/index.md",
           "python/DataProcess/numpy.md",
           "python/DataProcess/pandas.md",
           "python/DataProcess/matplotlib.md"
        ]},

        {"FastAPI" = [
            "python/FastAPI/index.md",
            "python/FastAPI/search.md",
            "python/FastAPI/param.md"
        ]},

        {"Asyncio" = [
            "python/FastAPI/index.md",
            "python/FastAPI/search.md"
        ]},

        {"Pydantic" = [
            "python/Pydantic/index.md"
        ]},

        {"SQLAlchemy" = [
            "python/SQLAlchemy/index.md",
            "python/SQLAlchemy/sqlalchemy_core.md",
            "python/SQLAlchemy/sqlalchemy_orm.md"
        ]},

        {"HTTPX" = [
            "python/HTTPX/index.md"
        ]},

        {"UV" = [
            "python/uv/index.md"
        ]}
    ] },

    {"Rust" = ["rust/index.md"]},

    {"Artificial Intelligence" = [
        "artificial_intelligence/index.md",

        {"Machine Learning" = "artificial_intelligence/machine_learning/index.md"},
        {"Computer Vision" = "artificial_intelligence/computer_vision/index.md"}
    ]},

    {"Web Development" = [
        "web_development/index.md",
        {"JavaScript" = "web_development/javascript/index.md"}
        ]},

    {"DataBase" = ["database/index.md"]},

    {"Computer Basic" =  [
        "computer_basic/index.md",

        {"Operate System" = "computer_basic/operate_system/index.md"},
        {"Computer Network" = "computer_basic/computer_network/index.md"},
        {"Data Structure" = "computer_basic/data_structure/index.md"},
        {"Linux" = [
            "computer_basic/linux/index.md",
            "computer_basic/linux/decompression_and_compression.md"
            ]},
        
        ]},

    {"Record" = ["record/index.md"]}

]

#site_url = "https://www.example.com/"
copyright = """
Copyright &copy; 2026 LeonSong  层楼终究误少年,自由早晚乱余生
"""


[project.theme]
favicon = "images/favicon.svg"
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.tabs",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    # "navigation.sections",
    "navigation.top",
    # "navigation.expand",
    "navigation.tracking",
    "search.highlight",
]

logo = "images/logo.svg"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/user/repo"

[project.extra]
generator = false

[project.extra.tags]
tag = "<identifier>"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
